<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spredsheet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="heading">Spreadsheet Application</div>
<div id="selected">Selected cell: <span id="selected-cell-id">None</span></div> 
<div id="formula">Formula Bar: <input type="text" id="formula-bar-input"></div>

    <div id="btn-cont">

        <button id="save">Save</button>
        <button id="clear">Clear</button>
    </div>
</body>
<script src="script.js"></script>
</html>
